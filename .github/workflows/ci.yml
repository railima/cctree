name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run lint
        name: Type check

      - run: npm test
        name: Run tests

      - run: npm run build
        name: Build

      - run: node dist/cli.js --help
        name: Smoke test CLI

      - run: timeout 2 node dist/cli.js --server 2>&1 || true
        name: Smoke test MCP server
